name: copilot-language-server
on:
  workflow_dispatch:
    inputs:
      COPILOT_VER:
        description: 'COPILOT version'
        type: string
        required: true
      KERBEROS_VER:
        description: 'Kerberos node version'
        type: string
        required: true
      PARCEL_WAT_VER:
        description: '@parcel/watcher node version'
        type: string
        required: true
      VSCODE_POL_WAT_VER:
        description: '@vscode/policy-watcher node version'
        type: string
        required: true
jobs:
  builds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create directory
        run: mkdir copilot_${{inputs.COPILOT_VER}}_deps
      - name: Install Copilot deps
        working-directory: copilot_${{inputs.COPILOT_VER}}_deps
        run: |
          npm install kerberos@${{ inputs.KERBEROS_VER }} @vscode/policy-watcher@${{ inputs.VSCODE_POL_WAT_VER }} @parcel/watcher@${{ inputs.PARCEL_WAT_VER }}
      - name: Remove cruft
        working-directory: copilot_${{inputs.COPILOT_VER}}_deps
        run: |
          rm node_modules/*/build/Release/*.node
          rm node_modules/@parcel/watcher-linux-x64-*/watcher.node
          rm node_modules/@vscode/*/build/Release{,/obj.target}/vscode-policy-watcher.node
      - name: Packup
        run: |
          tar caf /tmp/copilot-language-server-${{inputs.COPILOT_VER}}_deps.tar.xz copilot_${{inputs.COPILOT_VER}}_deps
# Upload Files
      - name: Publish
        uses: softprops/action-gh-release@v1
        with:
          name: copilot-language-server ${{inputs.COPILOT_VER}}
          body: |
            Copilot Language Server: [${{inputs.COPILOT_VER}}](https://github.com/github/copilot-language-server-release/releases/tag/${{inputs.COPILOT_VER}})
            kerberos: ${{ inputs.KERBEROS_VER }}
            @vscode/policy-watcher: ${{ inputs.VSCODE_POL_WAT_VER }}
            @parcel/watcher: ${{ inputs.PARCEL_WAT_VER }}
          tag_name:  copilot-language-server-${{inputs.COPILOT_VER}}
          files: |
            /tmp/copilot-language-server-${{inputs.COPILOT_VER}}_deps.tar.xz


